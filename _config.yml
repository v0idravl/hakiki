title: "hakiki"
description: "Quick reference for OSCP, CTF, and professional penetration testing."
url: "https://v0idravl.github.io"
baseurl: "/hakiki"
author: "v0idravl"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - "*.sh"
  - .gitignore
  - vendor/
