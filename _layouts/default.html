<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — hakiki{% else %}{% assign slug = page.path | split: '/' | last | split: '.' | first | replace: '_', ' ' %}{{ slug }} — hakiki{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a class="site-title" href="{{ '/' | relative_url }}">hakiki</a>
        <button class="sidebar-close" id="sidebar-close" aria-label="Close">&#x2715;</button>
      </div>

      <nav class="sidebar-nav" aria-label="Main navigation">
        {% for item in site.data.nav %}
          <div class="nav-item {% if item.children %}has-children{% endif %}">
            <a href="{{ item.url }}"
               class="nav-link {% if page.url == item.url or page.url contains item.url and item.url != '/hakiki/' %}active{% endif %}">
              {{ item.title }}
            </a>
            {% if item.children %}
              <ul class="nav-children">
                {% for child in item.children %}
                  <li>
                    <a href="{{ child.url }}"
                       class="{% if page.url contains child.url %}active{% endif %}">
                      {{ child.title }}
                    </a>
                  </li>
                {% endfor %}
              </ul>
            {% endif %}
          </div>
        {% endfor %}
      </nav>
    </aside>

    <!-- Main column -->
    <div class="main-col">

      <!-- Mobile top bar -->
      <header class="top-bar" id="top-bar">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <a class="top-bar-title" href="{{ '/' | relative_url }}">hakiki</a>
      </header>

      <!-- Content -->
      <main class="content">
        <div class="content-inner">
          {{ content }}
        </div>
      </main>

      <footer class="site-footer">
        <div class="footer-inner">
          <span>v0idravl &mdash; <a href="https://github.com/v0idravl/hakiki">github</a></span>
        </div>
      </footer>

    </div>
  </div>

  <!-- Mobile overlay -->
  <div class="overlay" id="overlay"></div>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
